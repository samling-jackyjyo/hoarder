packages:
  - "packages/*"
  - "apps/*"
  - "tooling/*"
  - "tools/*"
  - "docs"

nodeLinker: hoisted

allowBuilds:
  '@sentry/cli': true
  '@swc/core': true
  better-sqlite3: true
  esbuild: true
  re2: true
  sharp: true
  tesseract.js: true
  # These install scripts are informational or unnecessary for our installs.
  '@parcel/watcher': false
  core-js: false
  core-js-pure: false
  postman-code-generators: false
  protobufjs: false

patchedDependencies:
  react-tweet@3.2.2: "patches/react-tweet@3.2.2.patch"
  xcode@3.0.1: "patches/xcode@3.0.1.patch"
  playwright-extra@4.3.6: "patches/playwright-extra@4.3.6.patch"

# Docker builds can prune packages that use one of the root patches.
allowUnusedPatches: true

minimumReleaseAgeExclude:
  - '@restatedev/restate-sdk-clients@1.15.1'
  - '@restatedev/restate-sdk-core@1.15.1'
  - '@restatedev/restate-sdk@1.15.1'
